<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildPack 簡介</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }
        .hero {
            background-image: url('https://via.placeholder.com/1200x600?text=WildPack+Hero+Image');
            background-size: cover;
            color: white;
            text-align: center;
            padding: 150px 0;
        }
        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 24px;
        }
        .container {
            width: 80%;
            margin: 0 auto;
            padding: 50px 0;
        }
        .section-title {
            text-align: center;
            margin-bottom: 30px;
        }
        .value-proposition ul {
            list-style-type: none;
            padding: 0;
        }
        .value-proposition li {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            padding: 20px;
        }
        .features {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .feature-card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: calc(33% - 20px);
            text-align: center;
        }
        .feature-card img {
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
        }
        .workflow-steps {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .workflow-step {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: calc(33% - 20px);
            text-align: center;
        }
        .workflow-step img {
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
        }
        .cta {
            text-align: center;
            margin-top: 50px;
        }
        .cta button {
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>WildPack - 環保旅行包</h1>
        <p>輕巧、耐用、環保的旅行伴侣</p>
    </div>

    <div class="container">
        <section id="value-proposition" class="value-proposition">
            <div class="section-title">產品價值</div>
            <ul>
                <li><strong>環境友好：</strong>使用可再生材料製造，減少對環境的影響。</li>
                <li><strong>輕巧便攜：</strong>設計精簡，輕量級，適合各種旅行需求。</li>
                <li><strong>耐用長-lasting：</strong>強韌耐磨，長久耐用。</li>
            </ul>
        </section>

        <section id="features" class="features">
            <div class="section-title">功能特色</div>
            <div class="feature-card">
                <img src="https://via.placeholder.com/200x200?text=Feature+1" alt="Feature 1">
                <h3>防水設計</h3>
                <p>內部防水材料，保護您的行李不受潮濕影響。</p>
            </div>
            <div class="feature-card">
                <img src="https://via.placeholder.com/200x200?text=Feature+2" alt="Feature 2">
                <h3>多功能口袋</h3>
                <p>設計有多個口袋，方便存放旅行必需品。</p>
            </div>
            <div class="feature-card">
                <img src="https://via.placeholder.com/200x200?text=Feature+3" alt="Feature 3">
                <h3>可調整大小</h3>
                <p>可以根据需要調整大小，完美匹配不同景點。</p>
            </div>
        </section>

        <section id="workflow" class="workflow">
            <div class="section-title">使用流程</div>
            <div class="workflow-steps">
                <div class="workflow-step">
                    <img src="https://via.placeholder.com/200x200?text=Step+1" alt="Step 1">
                    <h3>選擇款式</h3>
                    <p>根據您的旅行需求選擇適合的WildPack款式。</p>
                </div>
                <div class="workflow-step">
                    <img src="https://via.placeholder.com/200x200?text=Step+2" alt="Step 2">
                    <h3>組裝行李</h3>
                    <p>輕鬆組裝行李，開始您的環保旅行。</p>
                </div>
                <div class="workflow-step">
                    <img src="https://via.placeholder.com/200x200?text=Step+3" alt="Step 3">
                    <h3>享受旅程</h3>
                    <p>輕鬆愉快地探索世界，享受旅行的每一刻。</p>
                </div>
            </div>
        </section>

        <section class="cta">
            <a href="#contact"><button>立即預購</button></a>
        </section>
    </div>
</body>
</html>
