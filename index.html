<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildPack</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f4f9fe, #ffffff);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        header {
            text-align: center;
            padding: 80px 0;
        }
        h1 {
            font-size: 3em;
            color: #333;
        }
        p {
            font-size: 1.2em;
            color: #666;
        }
        .features, .how-it-works {
            padding: 80px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
        }
        .feature-item, .step {
            width: 30%;
            min-width: 250px;
            text-align: center;
            margin-bottom: 40px;
        }
        .cta {
            text-align: center;
            padding: 80px 0;
        }
        .cta button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 8px;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 40px 0;
        }
        @media (max-width: 768px) {
            .feature-item, .step {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>WildPack - 玩家的最佳伴侣</h1>
    <p>輕鬆管理你的游戏裝備，让生活更精彩！</p>
</header>

<section class="features">
    <div class="feature-item">
        <h2>智能分类</h2>
        <p>自动识别并分类你的物品，让你的背包井井有条。</p>
    </div>
    <div class="feature-item">
        <h2>快速搜索</h2>
        <p>一键查找任何裝備，再也不用翻箱倒柜。</p>
    </div>
    <div class="feature-item">
        <h2>云端同步</h2>
        <p>你的裝備資料随时同步，多设备无缝切换。</p>
    </div>
</section>

<section class="how-it-works">
    <div class="step">
        <h2>步驟1</h2>
        <p>下载并安装WildPack应用。</p>
    </div>
    <div class="step">
        <h2>步驟2</h2>
        <p>連結你的游戏帳號，開始同步資料。</p>
    </div>
    <div class="step">
        <h2>步驟3</h2>
        <p>輕鬆管理你的裝備，享受便利生活！</p>
    </div>
</section>

<section class="cta">
    <button>立即下載</button>
</section>

<footer>
    <p>&copy; 2023 WildPack. All rights reserved.</p>
</footer>

</body>
</html>
